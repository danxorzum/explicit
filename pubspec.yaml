name: explicit_workspace
publish_to: none

environment:
  sdk: ^3.12.0

workspace:
  - packages/explicit
  - packages/explicit_outcome

dev_dependencies:
  melos: ^7.8.2
  test: ^1.31.1

melos:
  repository: https://github.com/danxorzum/explicit
  resolution: workspace

  scripts:
    pubget:all:
      description: Run `dart pub get` in all packages.
      exec: dart pub get

    quality:affected:
      description: >
        Print affected packages based on git diff (pr mode).
        Usage: melos run quality:affected
      run: dart run tool/quality_gate.dart --mode=pr --list-only
      exec:
        concurrency: 1

    quality:gate:
      description: >
        Run quality gates (format → analyze → test/coverage) on affected
        packages. Supports --mode=pr|pre-push with --base/--head for pr mode.
        Usage: melos run quality:gate -- --mode=pre-push
      run: dart run tool/quality_gate.dart

    quality:all:
      description: >
        Run quality gates on ALL packages regardless of changes.
        Use for main branch validation or full workspace checks.
        Usage: melos run quality:all
      run: dart run tool/quality_gate.dart --mode=all

    quality:coverage:
      description: >
        Check per-package coverage from existing lcov.info files.
        Requires prior test run with --coverage=coverage.
        Usage: melos run quality:coverage -- --all
      run: dart run tool/coverage_gate.dart
