name: explicit_workspace
publish_to: none

environment:
  sdk: ^3.12.0

workspace:
  - packages/explicit
  - packages/explicit_outcome

dev_dependencies:
  coverage: ^1.15.1
  melos: ^8.1.0
  pana: ^0.23.14
  test: ^1.31.1

melos:
  repository: https://github.com/danxorzum/explicit
  resolution: workspace

  scripts:
    pubget:all:
      description: Run `dart pub get` in all packages.
      exec: dart pub get

    quality:affected:
      description: >
        Print affected packages based on git diff (pr mode).
        Usage: melos run quality:affected
      run: dart run tool/quality_gate.dart --mode=pr --list-only

    quality:gate:
      description: >
        Run quality gates (format → analyze → test/coverage) on affected
        packages. Supports --mode=pr|pre-push with --base/--head for pr mode.
        Usage: melos run quality:gate -- --mode=pre-push
      run: dart run tool/quality_gate.dart

    quality:all:
      description: >
        Run quality gates on ALL packages regardless of changes.
        Use for main branch validation or full workspace checks.
        Usage: melos run quality:all
      run: dart run tool/quality_gate.dart --mode=all

    quality:coverage:
      description: >
        Check per-package coverage from existing lcov.info files.
        Requires prior test run with --coverage=coverage.
        Usage: melos run quality:coverage -- --all
      run: dart run tool/coverage_gate.dart

    quality:pana:
      description: >
        Run Pana on all publishable packages and require max score.
        Pass condition: grantedPoints == maxPoints (not hardcoded).
        Usage: melos run quality:pana
      run: dart run tool/pana_gate.dart --all

    publish:check:
      description: >
        Run publish dry-run readiness check for all packages.
        Executes `dart pub publish --dry-run` per package.
        Usage: melos run publish:check
      run: >
        dart run melos exec --concurrency 1 --fail-fast --
        "dart pub publish --dry-run"

    publish:simulate:
      description: >
        Run safe no-op publish simulation for explicitly selected publish
        candidates. Never expands dependents for publication and never executes
        real publish. Usage: melos run publish:simulate -- --packages=explicit_outcome
      run: dart run tool/publish_simulation.dart

    hooks:install:
      description: >
        Install or update the pre-push quality gate hook.
        The hook runs the same gates as CI (format, analyze, test, coverage).
        Usage: melos run hooks:install [-- --uninstall]
      run: dart run tool/install_hooks.dart

    release:changeset:
      description: >
        Create a new changeset boilerplate for declaring release intent.
        Usage: melos run release:changeset -- --package=<name> --bump=<level> --summary="<text>"
      run: dart run tool/release_changeset.dart init

    release:check:
      description: >
        Verify that publishable package changes have matching changesets.
        Fails CI if changesets are missing. Use --base and --head for PR mode.
        Usage: melos run release:check -- --base=<sha> --head=<sha>
      run: dart run tool/release_changeset.dart check

    release:plan:
      description: >
        Render the release plan from existing changesets plus explicit diff
        context. Shows candidates, bumps, changelog notes, and dependency
        updates. Usage: melos run release:plan -- --base=<sha> --head=<sha>
        [--format=markdown|json] or melos run release:plan --
        --changed-files=<comma-separated-files> [--format=markdown|json]
      run: dart run tool/release_changeset.dart plan

    release:version-pr:
      description: >
        Apply version and changelog edits to packages based on the release
        plan. Updates pubspec.yaml versions, CHANGELOG.md entries, and
        dependency caret ranges. Does not publish or create tags.
        Usage: melos run release:version-pr
      run: dart run tool/release_changeset.dart version-pr
