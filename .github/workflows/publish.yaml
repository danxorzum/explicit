# Publish — tag-triggered pub.dev trusted publishing via GitHub OIDC.
#
# Maintainer release sequence:
#   1. Merge the automated release/version PR after CI is green.
#   2. Manually create and push release tags that match committed provenance:
#      <package>/v<semver>, for example explicit_outcome/v0.1.0.
#   3. If both packages release, push explicit_outcome first. Wait until the
#      required explicit_outcome version is visible on pub.dev before pushing
#      the dependent explicit tag.
#
# Manual tag creation is the approval boundary for every release class, so this
# workflow intentionally has no patch/minor vs major environment split.
# Publishing uses OIDC trusted publishing only; no long-lived pub.dev tokens.

name: Publish

on:
  push:
    tags:
      - 'explicit_outcome/v*'
      - 'explicit/v*'

permissions:
  contents: read

jobs:
  validate_release:
    name: "Validate release tag"
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.validate.outputs.package }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.12.0"

      - name: Install workspace dependencies
        run: dart pub get

      - name: Validate release tag
        id: validate
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Validating tag: $TAG"

          TAG_TARGET=$(git rev-list -n 1 "$TAG")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$TAG_TARGET" != "$HEAD_COMMIT" ]; then
            echo "Release tag target check failed: $TAG points to $TAG_TARGET, checkout is $HEAD_COMMIT."
            exit 1
          fi

          RESULT=$(dart run tool/release_changeset.dart validate-release --tag="$TAG")
          echo "$RESULT"

          PACKAGE=$(echo "$RESULT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['package'])")
          VERSION=$(echo "$RESULT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['version'])")

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Validated: $PACKAGE v$VERSION"

  publish_package:
    name: "Publish package"
    needs: validate_release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.12.0"

      - name: Install workspace dependencies
        run: dart pub get

      - name: Publish ${{ needs.validate_release.outputs.package }}
        working-directory: packages/${{ needs.validate_release.outputs.package }}
        run: dart pub publish --force
